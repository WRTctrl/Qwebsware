<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yazılım & Siber Güvenlik</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --text-primary: #1a1a1a;
            --text-secondary: #6b7280;
            --accent: #000000;
            --border: #e5e7eb;
            --shadow: rgba(0,0,0,0.08);
        }

        [data-theme="dark"] {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --accent: #ffffff;
            --border: #333333;
            --shadow: rgba(0,0,0,0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.7;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
            overflow-x: hidden;
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            background: var(--bg-primary);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 0;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-links a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            height: 2px;
            bottom: -8px;
            left: 0;
            right: 0;
            background: var(--accent);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .nav-links a:hover::after {
            transform: scaleX(1);
        }

        .theme-toggle {
            background: none;
            border: 2px solid var(--border);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            color: var(--text-secondary);
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: scale(1.1);
        }

        /* Hero */
        .hero {
            text-align: center;
            padding: 12rem 0 10rem;
            background: var(--bg-secondary);
        }

        .hero h1 {
            font-size: clamp(3.5rem, 7vw, 6rem);
            font-weight: 700;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, var(--accent), var(--text-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }

        .hero p {
            font-size: 1.5rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 6rem;
        }

        /* Sections */
        .section {
            padding: 10rem 0;
        }

        .section-title {
            font-size: 3.5rem;
            text-align: center;
            margin-bottom: 5rem;
            font-weight: 700;
        }

        /* Tech Tabs */
        .tech-tabs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 4rem;
        }

        .tech-tab {
            background: var(--bg-primary);
            border: 2px solid var(--border);
            border-radius: 24px;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
        }

        .tech-tab::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), transparent);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .tech-tab:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 25px 50px var(--shadow);
        }

        .tech-tab:hover::before {
            transform: scaleX(1);
        }

        .tech-tab.active {
            border-color: var(--accent);
            background: linear-gradient(135deg, var(--accent)10%, var(--bg-primary));
            color: var(--bg-primary);
        }

        .tech-tab.active .tech-icon {
            background: var(--bg-primary);
            color: var(--accent);
        }

        .tech-icon {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--text-secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            margin: 0 auto 1.5rem;
            color: var(--bg-primary);
            transition: all 0.3s ease;
        }

        .tech-name {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        /* Tech Info Modal */
        .tech-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .tech-modal-content {
            background: var(--bg-primary);
            border-radius: 28px;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 4rem;
            position: relative;
            border: 2px solid var(--accent);
        }

        .modal-close {
            position: absolute;
            top: 2rem;
            right: 2.5rem;
            font-size: 2.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: color 0.3s ease;
        }

        .modal-close:hover {
            color: var(--accent);
        }

        .tech-modal h2 {
            font-size: 2.8rem;
            margin-bottom: 2rem;
            color: var(--accent);
        }

        .tech-description {
            font-size: 1.2rem;
            line-height: 1.8;
            color: var(--text-primary);
            margin-bottom: 2.5rem;
        }

        .tech-features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .feature {
            background: var(--bg-secondary);
            padding: 1.5rem;
            border-radius: 16px;
            border-left: 4px solid var(--accent);
        }

        .feature h4 {
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        /* Footer */
        footer {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 5rem 0 3rem;
            text-align: center;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links {
                gap: 1.5rem;
            }
            
            .container {
                padding: 0 1.5rem;
            }
            
            .hero {
                padding: 8rem 0 6rem;
            }
            
            .section {
                padding: 6rem 0;
            }
            
            .tech-modal-content {
                padding: 2.5rem 2rem;
            }
        }

        /* Scroll animations */
        .fade-in {
            opacity: 0;
            transform: translateY(60px);
            transition: all 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <nav class="container">
            <a href="#" class="logo">TechBit</a>
            <ul class="nav-links">
                <li><a href="#yazilim">Yazılım</a></li>
                <li><a href="#guvenlik">Siber Güvenlik</a></li>
            </ul>
            <button class="theme-toggle" id="themeToggle" title="Tema Değiştir">
                <i class="fas fa-moon"></i>
            </button>
        </nav>
    </header>

    <!-- Hero -->
    <section class="hero fade-in">
        <div class="container">
            <h1>Yazılım & Siber Güvenlik</h1>
            <p>Backend • Frontend • DevOps • Penetrasyon Testi • Red Team • Blue Team</p>
        </div>
    </section>

    <!-- Yazılım -->
    <section id="yazilim" class="section fade-in">
        <div class="container">
            <h2 class="section-title">Yazılım Teknolojileri</h2>
            <div class="tech-tabs" id="techTabs">
                <!-- Teknoloji sekmeleri dinamik olarak eklenecek -->
            </div>
        </div>
    </section>

    <!-- Siber Güvenlik -->
    <section id="guvenlik" class="section" style="background: var(--bg-secondary);">
        <div class="container">
            <h2 class="section-title">Siber Güvenlik Araçları</h2>
            <div class="tech-tabs" id="securityTabs">
                <!-- Güvenlik sekmeleri dinamik olarak eklenecek -->
            </div>
        </div>
    </section>

    <!-- Tech Modal -->
    <div id="techModal" class="tech-modal">
        <div class="tech-modal-content">
            <span class="modal-close" id="modalClose">&times;</span>
            <div id="modalContent">
                <!-- İçerik buraya yüklenecek -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>WEBWARE 2026</p>
        </div>
    </footer>

    <script>
        // Teknoloji verileri
        const techData = {
            yazilim: [
                {
                    id: 'python',
                    icon: 'fab fa-python',
                    name: 'Python',
                    description: 'Yüksek seviyeli, yorumlanan bir programlama dili. Veri bilimi, yapay zeka ve otomasyon projelerinde lider.',
                    features: [
                        { title: 'Kütüphaneler', desc: 'NumPy, Pandas, TensorFlow, Django, Flask' },
                        { title: 'Performans', desc: 'Python Hızlı bir programlama dilidir' },
                        { title: 'Ekosistem', desc: 'Çok Fazla PyPI paketi' }
                    ]
                },
                {
                    id: 'java',
                    icon: 'fab fa-java',
                    name: 'Java',
                    description: 'Platform bağımsız, nesne yönelimli dil. Kurumsal uygulamalar ve Android geliştirme.',
                    features: [
                        { title: 'JVM', desc: 'Write Once, Run Anywhere' },
                        { title: 'Spring Boot', desc: 'Hızlı mikro servis geliştirme' },
                        { title: 'Android', desc: 'Mobil uygulama geliştirme' }
                    ]
                },
                {
                    id: 'html',
                    icon: 'fab fa-html5',
                    name: 'HTML/CSS/JS',
                    description: 'Web teknolojilerinin temeli. Modern frontend geliştirme.',
                    features: [
                        { title: 'HTML5', desc: 'Semantik etiketler' },
                        { title: 'CSS3', desc: 'Flexbox, Grid, Animasyonlar' },
                        { title: 'ES6+', desc: 'Modern JavaScript' }
                    ]
                },
                {
                    id: 'nodejs',
                    icon: 'fab fa-node-js',
                    name: 'Node.js',
                    description: 'JavaScript runtime. Hızlı backend ve API geliştirme.',
                    features: [
                        { title: 'NPM', desc: '2M+ paket' },
                        { title: 'Event Loop', desc: 'Non-blocking I/O' },
                        { title: 'Express', desc: 'Minimalist web framework' }
                    ]
                },
                {
                    id: 'rust',
                    icon: 'fab fa-rust',
                    name: 'Rust',
                    description: 'Hızlı sistem programlama dili.',
                    features: [
                        { title: 'Memory Safety', desc: 'Compile time garanti' },
                        { title: 'Performans', desc: 'Hızlı' },
                        { title: 'Concurrency', desc: 'Fearless concurrency' }
                    ]
                }
            ],
            guvenlik: [
                {
                    id: 'burp',
                    icon: 'fas fa-bug',
                    name: 'Burp Suite',
                    description: 'Profesyonel web penetrasyon testi aracı.',
                    features: [
                        { title: 'Proxy', desc: 'Trafik yakalama' },
                        { title: 'Scanner', desc: 'Otomatik tarama' },
                        { title: 'Intruder', desc: 'Fuzzing saldırıları' }
                    ]
                },
                {
                    id: 'metasploit',
                    icon: 'fas fa-skull-crossbones',
                    name: 'Metasploit',
                    description: 'Penetrasyon testi framework\'ü.',
                    features: [
                        { title: '2000+ Exploit', desc: 'Güncel veritabanı' },
                        { title: 'Payloads', desc: 'Çoklu platform' },
                        { title: 'Post Modules', desc: 'Sistem keşfi' }
                    ]
                },
                {
                    id: 'nmap',
                    icon: 'fas fa-network-wired',
                    name: 'Nmap',
                    description: 'Ağ tarama ve port keşif aracı.',
                    features: [
                        { title: '100K+ Port', desc: 'Hızlı tarama' },
                        { title: 'Script Engine', desc: 'NSE scripts' },
                        { title: 'OS Detection', desc: 'İşletim sistemi tespiti' }
                    ]
                },
                {
                    id: 'wireshark',
                    icon: 'fas fa-eye',
                    name: 'Wireshark',
                    description: 'Ağ protokol analizörü.',
                    features: [
                        { title: 'Live Capture', desc: 'Gerçek zamanlı' },
                        { title: '300+ Protocol', desc: 'Destek' },
                        { title: 'Filters', desc: 'Gelişmiş filtreleme' }
                    ]
                }
            ]
        };

        // Tema Değiştirici
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;
        
        themeToggle.addEventListener('click', () => {
            body.dataset.theme = body.dataset.theme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', body.dataset.theme);
            themeToggle.querySelector('i').className = body.dataset.theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        });

        // Kaydedilen temayı yükle
        const savedTheme = localStorage.getItem('theme') || 'light';
        body.dataset.theme = savedTheme;
        themeToggle.querySelector('i').className = savedTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';

        // Sekmeleri oluştur
        function createTabs(containerId, dataKey) {
            const container = document.getElementById(containerId);
            techData[dataKey].forEach(tech => {
                const tab = document.createElement('div');
                tab.className = 'tech-tab';
                tab.dataset.tech = tech.id;
                tab.innerHTML = `
                    <div class="tech-icon">
                        <i class="${tech.icon}"></i>
                    </div>
                    <div class="tech-name">${tech.name}</div>
                `;
                tab.onclick = () => openTechModal(tech);
                container.appendChild(tab);
            });
        }

        // Modal aç
        function openTechModal(tech) {
            const modal = document.getElementById('techModal');
            const modalContent = document.getElementById('modalContent');
            
            modalContent.innerHTML = `
                <h2>${tech.name}</h2>
                <p class="tech-description">${tech.description}</p>
                <div class="tech-features">
                    ${tech.features.map(f => `
                        <div class="feature">
                            <h4>${f.title}</h4>
                            <p>${f.desc}</p>
                        </div>
                    `).join('')}
                </div>
            `;
            
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        // Modal kapat
        document.getElementById('modalClose').onclick = () => {
            document.getElementById('techModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        };

        document.getElementById('techModal').onclick = (e) => {
            if (e.target === document.getElementById('techModal')) {
                document.getElementById('techModal').style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        };

        // Sekmeleri başlat
        createTabs('techTabs', 'yazilim');
        createTabs('securityTabs', 'guvenlik');

        // Yumuşak kaydırma
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });

        // Kaydırma animasyonları
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry, index) => {
                if (entry.isIntersecting) {
                    setTimeout(() => {
                        entry.target.classList.add('visible');
                    }, index * 150);
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
    </script>
</body>
</html>
